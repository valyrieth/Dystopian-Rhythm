name: Build and Release

permissions:
  contents: write
  discussions: write
  
on:
  push:
    branches:
      - main
    tags:
      - "v*" # Trigger on tags starting with 'v'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.x'

    - name: Restore dependencies
      run: dotnet restore RhythmKeyBot.csproj

    - name: Build
      run: dotnet build RhythmKeyBot.csproj --configuration Release --no-restore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Restore dependencies
      run: dotnet restore RhythmKeyBot.csproj

    - name: Publish Release
      run: dotnet publish RhythmKeyBot.csproj --configuration Release --output ./publish

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./publish/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}